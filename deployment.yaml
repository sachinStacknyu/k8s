apiVersion: apps/v1
kind: Deployment

metadata:
  name: practice-deployment
  labels:
    app: nginx

spec:
  replicas: 4

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx:1.25.3

          ports:
            - containerPort: 80

          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"

            requests:
              memory: "128Mi"
              cpu: "250m"

  # RollingUpdate is the default deployment strategy in Kubernetes which does not require any other service .
  # It gradually replaces old Pods with new Pods during updates.

  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable defines how many Pods can be unavailable
      # during the rolling update process.
      maxUnavailable: 1

      # maxSurge defines how many extra Pods can be created
      # above the desired replica count during the update.
      maxSurge: 1

# Recreate strategy terminates all existing Pods first,
# then creates new Pods with the updated version.

# strategy:
# type: Recreate
# rollingUpdate:
#  In the recreate deployment type we dont use the maxSurge beacuse it kill(terminiate)
# all the pods and and make as many as there were initially
# maxSurge: 1
# maxUnavailable: 1
