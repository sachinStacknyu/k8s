apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
  - image: nginx:1.12.1
    name: nginx
    volumeMounts:
    - mountPath: /cache
      name: cache-volume
    ports:
    - containerPort: 8080
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "64Mi"
        cpu: "250m"
      
  volumes:
  - name: cache-volume
    emptyDir:
      sizeLimit: 500Mi
   
